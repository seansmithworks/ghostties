<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ghostties</title>
  <link rel="icon" type="image/svg+xml" href="">
  <script>

      var colors = ['#FF4136','#7C4DFF','#00BCD4','#FF80AB','#FF9800','#FFEB3B','#81D4FA','#7986CB'];
      var c = colors[Math.floor(Math.random() * colors.length)];
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">'
        + '<path d="M4 2h8v1h2v1h1v10h-1v-1h-1v-1h-1v2h-1v-2h-1v1h-1v1h-1v-2h-1v2h-1v-1h-1v1H4v-1H3V3h1z" fill="' + c + '"/>'
        + '<rect x="5" y="5" width="2" height="3" fill="white"/>'
        + '<rect x="9" y="5" width="2" height="3" fill="white"/>'
        + '<rect x="6" y="6" width="1" height="2" fill="#1a1a2e"/>'
        + '<rect x="10" y="6" width="1" height="2" fill="#1a1a2e"/>'
        + '</svg>';
      var link = document.querySelector('link[rel="icon"]');
      link.href = 'data:image/svg+xml;base64,' + btoa(svg);
    })();
  </script>
  <meta name="description" content="Ghostties — a multi-agent workspace terminal. Now in beta.">
  <meta property="og:title" content="ghostties">
  <meta property="og:description" content="A multi-agent workspace terminal. Now in beta.">
  <meta property="og:image" content="/assets/poster.png">
  <meta property="og:type" content="website">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #1a1a2e;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px;
    }

    /* --- Scene container --- */
    .scene {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 48px 32px 40px;
      user-select: none;
    }

    /* --- Ghost grid (pyramid) --- */
    .ghosts {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }

    .ghost-row {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .ghost {
      width: 100px;
      height: 100px;
      opacity: 0;
    }

    .ghost svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* --- Entrance: each ghost flies in from a unique direction --- */
    .animate .g0 { animation: entrance-g0 0.8s ease-out forwards, float-g0 2.4s ease-in-out 1.5s infinite alternate; }
    .animate .g1 { animation: entrance-g1 0.8s 1.8s ease-out forwards, float-g1 2.8s ease-in-out 3.0s infinite alternate; }
    .animate .g2 { animation: entrance-g2 0.8s 2.0s ease-out forwards, float-g2 3.1s ease-in-out 3.2s infinite alternate; }
    .animate .g3 { animation: entrance-g3 0.8s 2.2s ease-out forwards, float-g3 2.6s ease-in-out 3.4s infinite alternate; }
    .animate .g4 { animation: entrance-g4 0.8s 2.4s ease-out forwards, float-g4 3.3s ease-in-out 3.6s infinite alternate; }
    .animate .g5 { animation: entrance-g5 0.8s 2.6s ease-out forwards, float-g5 2.9s ease-in-out 3.8s infinite alternate; }
    .animate .g6 { animation: entrance-g6 0.8s 2.8s ease-out forwards, float-g6 3.5s ease-in-out 4.0s infinite alternate; }
    .animate .g7 { animation: entrance-g7 0.8s 3.0s ease-out forwards, float-g7 2.7s ease-in-out 4.2s infinite alternate; }

    @keyframes entrance-g0 { from { transform: translateY(-300px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes entrance-g1 { from { transform: translate(-300px, -150px); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    @keyframes entrance-g2 { from { transform: translate(300px, -150px); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    @keyframes entrance-g3 { from { transform: translate(-400px, 0); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    @keyframes entrance-g4 { from { transform: translateY(-350px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes entrance-g5 { from { transform: translate(400px, 0); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    @keyframes entrance-g6 { from { transform: translate(-250px, 200px); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }
    @keyframes entrance-g7 { from { transform: translate(250px, 200px); opacity: 0; } to { transform: translate(0, 0); opacity: 1; } }

    @keyframes float-g0 { from { transform: translate(0, -5px); }   to { transform: translate(1px, 4px); } }
    @keyframes float-g1 { from { transform: translate(2px, -3px); } to { transform: translate(-2px, 5px); } }
    @keyframes float-g2 { from { transform: translate(-1px, -4px); } to { transform: translate(2px, 3px); } }
    @keyframes float-g3 { from { transform: translate(1px, -6px); } to { transform: translate(-1px, 3px); } }
    @keyframes float-g4 { from { transform: translate(-2px, -3px); } to { transform: translate(1px, 5px); } }
    @keyframes float-g5 { from { transform: translate(0, -4px); }   to { transform: translate(-2px, 4px); } }
    @keyframes float-g6 { from { transform: translate(2px, -5px); } to { transform: translate(-1px, 4px); } }
    @keyframes float-g7 { from { transform: translate(-1px, -3px); } to { transform: translate(2px, 6px); } }

    /* --- Terminal text --- */
    .terminal {
      font-family: 'SFMono-Regular', 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 600;
      line-height: 2;
      color: #E0E0E0;
      width: 46ch;
      max-width: calc(100vw - 48px);
      margin: 0 auto;
      text-align: left;
    }

    .line {
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      border-right: 2px solid transparent;
    }

    /* Diff line colors + hanging indent */
    .line-1, .line-2 {
      margin-left: 2ch;
    }

    .line-3, .line-4, .line-5, .line-6 {
      color: transparent;
      background: transparent;
      padding-left: 2ch;
      text-indent: -2ch;
    }

    .line-6 a {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    .line-6 a:hover {
      text-decoration: underline;
    }

    /* Caret blink states */
    .animate .line-1.caret-visible {
      border-right-color: #E0E0E0;
    }

    .animate .line-2.caret-visible {
      border-right-color: #E0E0E0;
    }

    .animate .line-6.caret-blink {
      animation: blink-caret-green 0.53s step-end infinite;
    }

    /* Typing animations */
    /* line-1: "cd ~/ghostties" = 14 chars */
    .animate .line-1 {
      animation: type-line1 0.56s steps(14) 1.0s forwards;
    }

    /* line-2: "https://github.com/SeanSmithDesign/ghostties" = 44 chars */
    .animate .line-2 {
      animation: type-line2 1.1s steps(44) 4.2s forwards;
    }

    /* line-3: "- ghostties % install soon" = 26 chars */
    .animate .line-3 {
      animation:
        type-line3 0.65s steps(26) 5.5s forwards,
        reveal-line3 0s 5.5s forwards;
    }

    /* line-4: "+ ghostties % v0.1.0-beta.19" = 28 chars */
    .animate .line-4 {
      animation:
        type-line4 0.7s steps(28) 7.0s forwards,
        reveal-line-green 0s 7.0s forwards;
    }

    /* line-5: "+ 27Apr2026 · macOS 13+ · Apple Silicon" = 39 chars */
    .animate .line-5 {
      animation:
        type-line5 1.0s steps(39) 8.2s forwards,
        reveal-line-green 0s 8.2s forwards;
    }

    /* line-6: "+ [download now]" = 16 chars */
    .animate .line-6 {
      animation:
        type-line6 0.4s steps(16) 9.7s forwards,
        reveal-line-green 0s 9.7s forwards;
    }

    @keyframes type-line1 { from { width: 0; } to { width: 14ch; } }
    @keyframes type-line2 { from { width: 0; } to { width: 44ch; } }
    @keyframes type-line3 { from { width: 0; } to { width: 26ch; } }
    @keyframes type-line4 { from { width: 0; } to { width: 28ch; } }
    @keyframes type-line5 { from { width: 0; } to { width: 39ch; } }
    @keyframes type-line6 { from { width: 0; } to { width: 16ch; } }

    @keyframes reveal-line3 {
      to { color: rgba(255, 100, 100, 0.7); background: rgba(255, 80, 80, 0.13); }
    }

    @keyframes reveal-line-green {
      to { color: rgba(100, 220, 120, 0.9); background: rgba(80, 210, 100, 0.13); }
    }

    @keyframes blink-caret-green {
      0%, 100% { border-right-color: rgba(100, 220, 120, 0.9); }
      50%       { border-right-color: transparent; }
    }

    .terminal a.gh-link {
      color: #E0E0E0;
      text-decoration: none;
      cursor: pointer;
    }

    .terminal a.gh-link:hover {
      text-decoration: underline;
    }

    /* --- Scatter (click ghosts to burst apart, then reassemble) --- */
    @keyframes scatter-g0 { 0% { opacity:1; transform:translate(0,0); }   100% { opacity:0; transform:translate(0,-600px) scale(0.4); } }
    @keyframes scatter-g1 { 0% { opacity:1; transform:translate(0,0); }   100% { opacity:0; transform:translate(-500px,-400px) scale(0.4); } }
    @keyframes scatter-g2 { 0% { opacity:1; transform:translate(0,0); }   100% { opacity:0; transform:translate(500px,-400px) scale(0.4); } }
    @keyframes scatter-g3 { 0% { opacity:1; transform:translate(0,0); }   100% { opacity:0; transform:translate(-600px,0) scale(0.4); } }
    @keyframes scatter-g4 { 0% { opacity:1; transform:translate(0,0); }   100% { opacity:0; transform:translate(0,-550px) scale(0.4); } }
    @keyframes scatter-g5 { 0% { opacity:1; transform:translate(0,0); }   100% { opacity:0; transform:translate(600px,0) scale(0.4); } }
    @keyframes scatter-g6 { 0% { opacity:1; transform:translate(0,0); }   100% { opacity:0; transform:translate(-400px,500px) scale(0.4); } }
    @keyframes scatter-g7 { 0% { opacity:1; transform:translate(0,0); }   100% { opacity:0; transform:translate(400px,500px) scale(0.4); } }

    .scatter .g0 { animation: scatter-g0 0.55s ease-in forwards !important; }
    .scatter .g1 { animation: scatter-g1 0.55s ease-in forwards !important; }
    .scatter .g2 { animation: scatter-g2 0.55s ease-in forwards !important; }
    .scatter .g3 { animation: scatter-g3 0.55s ease-in forwards !important; }
    .scatter .g4 { animation: scatter-g4 0.55s ease-in forwards !important; }
    .scatter .g5 { animation: scatter-g5 0.55s ease-in forwards !important; }
    .scatter .g6 { animation: scatter-g6 0.55s ease-in forwards !important; }
    .scatter .g7 { animation: scatter-g7 0.55s ease-in forwards !important; }

    .scatter .terminal {
      transition: opacity 0.3s ease-in;
      opacity: 0;
    }

    /* --- Product section --- */
    .product {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 32px 96px;
      text-align: center;
    }

    .product h2 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: #E0E0E0;
      margin-bottom: 40px;
      letter-spacing: -0.01em;
      line-height: 1.25;
    }

    .product h2 span {
      display: block;
      opacity: 0;
      transform: translateY(16px);
    }

    /* Window card: glow behind, tilt + chrome + video on top */
    .product-window {
      position: relative;
      margin: 0 auto 24px;
      max-width: 760px;
    }

    .product-window::before {
      content: '';
      position: absolute;
      inset: -10%;
      background: radial-gradient(circle at 50% 45%, rgba(201, 115, 80, 0.3), transparent 65%);
      filter: blur(40px);
      z-index: 0;
    }

    .product-card {
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: scale(0.94) rotate(-4deg) translateY(24px);
      border-radius: 10px;
      overflow: hidden;
      background: #0f0f1a;
      box-shadow:
        0 34px 80px -22px rgba(0, 0, 0, 0.7),
        0 6px 18px rgba(0, 0, 0, 0.35);
    }

    .product-chrome {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 32px;
      background: #F0E9E6;
      padding: 0 12px;
    }

    .product-chrome-dots {
      position: absolute;
      left: 12px;
      display: flex;
      gap: 6px;
    }

    .product-chrome-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: block;
      opacity: 0;
      transform: scale(0.4);
    }

    .product-chrome-dots span:nth-child(1) { background: #ED6A5E; }
    .product-chrome-dots span:nth-child(2) { background: #F4BF4F; }
    .product-chrome-dots span:nth-child(3) { background: #61C554; }

    .product-chrome-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #6b6b6b;
      background: rgba(0, 0, 0, 0.04);
      padding: 3px 12px;
      border-radius: 999px;
      opacity: 0;
    }

    .product-card video {
      width: 100%;
      height: auto;
      display: block;
    }

    .product-caption {
      font-family: 'SFMono-Regular', 'SF Mono', monospace;
      font-size: 12px;
      color: #C97350;
      margin-top: 12px;
      opacity: 0;
    }

    /* --- Product boot-sequence entrance (scroll-triggered) --- */
    .product.reveal h2 span:nth-child(1) {
      animation: product-fade-up 0.5s ease-out forwards;
    }

    .product.reveal h2 span:nth-child(2) {
      animation: product-fade-up 0.5s 0.15s ease-out forwards;
    }

    .product.reveal .product-card {
      animation: product-card-in 0.6s 0.25s cubic-bezier(0.22, 0.75, 0.32, 1) forwards;
    }

    .product.reveal .product-chrome-dots span:nth-child(1) {
      animation: product-dot-pop 0.3s 0.65s ease-out forwards;
    }

    .product.reveal .product-chrome-dots span:nth-child(2) {
      animation: product-dot-pop 0.3s 0.71s ease-out forwards;
    }

    .product.reveal .product-chrome-dots span:nth-child(3) {
      animation: product-dot-pop 0.3s 0.77s ease-out forwards;
    }

    .product.reveal .product-chrome-label {
      animation: product-fade-in 0.4s 0.7s ease-out forwards;
    }

    .product.reveal .product-caption {
      animation: product-fade-in 0.5s 0.9s ease-out forwards;
    }

    @keyframes product-fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes product-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes product-card-in {
      0%   { opacity: 0; transform: scale(0.94) rotate(-4deg) translateY(24px); }
      60%  { opacity: 1; transform: scale(1.01) rotate(-2.5deg) translateY(-3px); }
      100% { opacity: 1; transform: scale(1) rotate(-1.1deg) translateY(0); }
    }

    @keyframes product-dot-pop {
      0%   { opacity: 0; transform: scale(0.4); }
      70%  { opacity: 1; transform: scale(1.15); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* --- Footer --- */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      font-family: 'SFMono-Regular', 'SF Mono', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
    }

    footer a {
      color: rgba(255, 255, 255, 0.25);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: rgba(255, 255, 255, 0.5);
    }

    .footer-icons {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    footer svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    /* --- Ambient ghost backdrop (passive, low-opacity, behind all content) --- */
    .ghost-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-ghost {
      position: absolute;
      width: 36px;
      height: 36px;
      opacity: 0.12;
      pointer-events: none;
      will-change: transform;
    }

    .bg-ghost svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .bg-ghost-1 { top: 8%;  left: 6%;  animation: bg-drift-1 34s ease-in-out infinite; animation-delay: 0s; }
    .bg-ghost-2 { top: 62%; left: 84%; animation: bg-drift-2 41s ease-in-out infinite; animation-delay: 5s; }
    .bg-ghost-3 { top: 30%; left: 90%; animation: bg-drift-3 28s ease-in-out infinite; animation-delay: 10s; }
    .bg-ghost-4 { top: 80%; left: 12%; animation: bg-drift-4 45s ease-in-out infinite; animation-delay: 3s; }
    .bg-ghost-5 { top: 16%; left: 48%; animation: bg-drift-5 37s ease-in-out infinite; animation-delay: 8s; }
    .bg-ghost-6 { top: 52%; left: 3%;  animation: bg-drift-6 32s ease-in-out infinite; animation-delay: 14s; }

    @keyframes bg-drift-1 { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(16px, 12px) rotate(1deg); } 100% { transform: translate(0, 0) rotate(0deg); } }
    @keyframes bg-drift-2 { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-18px, 10px) rotate(-1deg); } 100% { transform: translate(0, 0) rotate(0deg); } }
    @keyframes bg-drift-3 { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-12px, -14px) rotate(1deg); } 100% { transform: translate(0, 0) rotate(0deg); } }
    @keyframes bg-drift-4 { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(14px, -10px) rotate(-1deg); } 100% { transform: translate(0, 0) rotate(0deg); } }
    @keyframes bg-drift-5 { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(-10px, 16px) rotate(1deg); } 100% { transform: translate(0, 0) rotate(0deg); } }
    @keyframes bg-drift-6 { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(12px, -12px) rotate(-1deg); } 100% { transform: translate(0, 0) rotate(0deg); } }

    @media (prefers-reduced-motion: reduce) {
      .bg-ghost { animation: none !important; }
      .product h2 span,
      .product-card,
      .product-chrome-dots span,
      .product-chrome-label,
      .product-caption {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
      .product-card { transform: rotate(-1.1deg) !important; }
    }

    /* --- Mobile --- */
    @media (max-width: 480px) {
      body { padding: 16px; }
      .scene { padding: 32px 20px 28px; }
      .ghost { width: 64px; height: 64px; }
      .ghost-row { gap: 10px; }
      .ghosts { gap: 10px; margin-bottom: 28px; }
      .terminal { font-size: 16px; }
      footer { padding: 12px 16px; font-size: 10px; }
      .product { padding: 16px 20px 72px; }
      .product h2 { font-size: 22px; margin-bottom: 28px; }
      .product-window { margin-bottom: 16px; }
      .product-chrome { height: 26px; }
      .product-chrome-dots span { width: 8px; height: 8px; }
      .product-chrome-label { font-size: 10px; padding: 2px 10px; }
      .product-caption { font-size: 11px; margin-top: 8px; }
      .bg-ghost { width: 22px; height: 22px; }
    }
  </style>
  <noscript>
    <style>
      .product h2 span,
      .product-card,
      .product-chrome-dots span,
      .product-chrome-label,
      .product-caption {
        opacity: 1 !important;
        transform: none !important;
      }
      .product-card { transform: rotate(-1.1deg) !important; }
    </style>
  </noscript>
</head>
<body>
  <div class="ghost-backdrop" aria-hidden="true">
    <div class="bg-ghost bg-ghost-1">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="#FF4136" shape-rendering="crispEdges">
        <rect x="12" y="0" width="24" height="4"/><rect x="8" y="4" width="32" height="4"/><rect x="4" y="8" width="40" height="4"/><rect x="4" y="12" width="8" height="8"/><rect x="20" y="12" width="8" height="8"/><rect x="36" y="12" width="8" height="8"/><rect x="0" y="20" width="48" height="20"/><rect x="0" y="40" width="8" height="4"/><rect x="12" y="40" width="8" height="4"/><rect x="28" y="40" width="8" height="4"/><rect x="40" y="40" width="8" height="4"/><rect x="0" y="44" width="4" height="4"/><rect x="16" y="44" width="4" height="4"/><rect x="28" y="44" width="4" height="4"/><rect x="44" y="44" width="4" height="4"/>
      </svg>
    </div>
    <div class="bg-ghost bg-ghost-2">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="#00BCD4" shape-rendering="crispEdges">
        <rect x="12" y="0" width="24" height="4"/><rect x="8" y="4" width="32" height="4"/><rect x="4" y="8" width="40" height="4"/><rect x="4" y="12" width="12" height="8"/><rect x="32" y="12" width="12" height="8"/><rect x="0" y="20" width="48" height="20"/><rect x="0" y="40" width="4" height="4"/><rect x="8" y="40" width="8" height="4"/><rect x="20" y="40" width="8" height="4"/><rect x="32" y="40" width="8" height="4"/><rect x="44" y="40" width="4" height="4"/><rect x="0" y="44" width="4" height="4"/><rect x="12" y="44" width="4" height="4"/><rect x="32" y="44" width="4" height="4"/><rect x="44" y="44" width="4" height="4"/>
      </svg>
    </div>

  <script>
    const scene = document.querySelector('.scene');
    const ghLink = document.querySelector('.gh-link');
    const dlLink = document.querySelector('.line-6 a');
    let animating = false;

    function activateCarets() {
      const line1 = document.querySelector('.line-1');
      const line2 = document.querySelector('.line-2');
      const line6 = document.querySelector('.line-6');

      // Line 1: caret appears at 1.0s, disappears when line 2 starts at 4.2s
      setTimeout(() => { line1.classList.add('caret-visible'); }, 1000);
      setTimeout(() => { line1.classList.remove('caret-visible'); }, 4200);

      // Line 2: caret appears at 4.2s, disappears when line 3 starts at 5.5s
      setTimeout(() => { line2.classList.add('caret-visible'); }, 4200);
      setTimeout(() => { line2.classList.remove('caret-visible'); }, 5500);

      // Line 6: caret + inline locks when typing ends (9.7s delay + 0.4s duration = 10.1s)
      setTimeout(() => {
        line6.classList.add('caret-blink');
        line6.style.width = '16ch';
        line6.style.color = 'rgba(100, 220, 120, 0.9)';
        line6.style.background = 'rgba(80, 210, 100, 0.13)';
      }, 10100);
    }

    activateCarets();

    // Click ghosts to scatter, then reassemble after a pause
    const ghosts = document.querySelector('.ghosts');
    ghosts.addEventListener('click', () => {
      if (animating) return;
      animating = true;
      scene.classList.add('scatter');

      setTimeout(() => {
        scene.classList.remove('scatter');

        // Clear caret state
        const line1 = document.querySelector('.line-1');
        const line2 = document.querySelector('.line-2');
        const line6 = document.querySelector('.line-6');
        line1.classList.remove('caret-visible');
        line2.classList.remove('caret-visible');
        line6.classList.remove('caret-blink');
        line6.style.width = '';
        line6.style.color = '';
        line6.style.background = '';

        // Restart entrance animations
        scene.classList.remove('animate');
        void scene.offsetWidth;
        scene.classList.add('animate');

        activateCarets();
        animating = false;
      }, 1400); // 0.55s scatter + ~0.85s pause before ghosts fly back in
    });

    // Don't scatter when clicking links
    ghLink.addEventListener('click', (e) => e.stopPropagation());
    dlLink.addEventListener('click', (e) => e.stopPropagation());
  </script>

  <script>
    // Product section boot-sequence: reveal + restart video once scrolled into view.
    (function() {
      const product = document.querySelector('.product');
      const video = product.querySelector('.product-card video');

      function reveal() {
        product.classList.add('reveal');
        video.currentTime = 0;
        video.play();
      }

      if (!('IntersectionObserver' in window)) {
        reveal();
        return;
      }

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            reveal();
            obs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.25 });

      observer.observe(product);
    })();
  </script>
