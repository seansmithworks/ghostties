# Ghostties Release Workflow
#
# Builds, signs, notarizes, and publishes a Ghostties release to GitHub Releases.
# Triggered by version tags (e.g. v0.1.0, v0.1.0-beta.1).
#
# Key differences from upstream release-tag.yml:
#   - Builds GhosttyKit.xcframework from source via Zig (gitignored — not committed)
#   - Uses standard macos-latest runners instead of Namespace Labs runners
#   - Uploads to GitHub Releases instead of Cloudflare R2
#   - Produces separate stable and beta appcast files for Sparkle auto-updates
#
# Required secrets:
#   PROD_MACOS_CERTIFICATE        — base64-encoded Developer ID Application .p12 cert
#   PROD_MACOS_CERTIFICATE_PWD    — password for the .p12 cert
#   PROD_MACOS_CERTIFICATE_NAME   — e.g. "Developer ID Application: Sean Smith (XXXXXXXXXX)"
#   PROD_MACOS_CI_KEYCHAIN_PWD    — CI keychain password (any strong random string)
#   APPLE_NOTARIZATION_ISSUER     — App Store Connect API issuer ID (UUID)
#   APPLE_NOTARIZATION_KEY_ID     — App Store Connect API key ID
#   APPLE_NOTARIZATION_KEY        — App Store Connect API .p8 key contents
#   SPARKLE_PRIVATE_KEY           — EdDSA private key generated by Sparkle's generate_keys

on:
  # Tag-triggered: full release pipeline (build → sign → notarize → publish).
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  # Manually triggered: pipeline iteration without tagging or publishing.
  # Use this to validate signing/notarization changes before tagging a real
  # beta. When dry_run=true, the appcast and release jobs are skipped — the
  # DMG is uploaded as a CI artifact instead of attached to a GitHub Release.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and notarize only — skip release upload + appcast"
        type: boolean
        default: true

name: Ghostties Release

# Only one release can run at a time to prevent artifact corruption.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # setup: Extract version, build number, and commit info from the tag
  # ---------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
      build: ${{ steps.extract.outputs.build }}
      commit: ${{ steps.extract.outputs.commit }}
      commit_long: ${{ steps.extract.outputs.commit_long }}
      is_beta: ${{ steps.extract.outputs.is_beta }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # Full history required for accurate build number via rev-list --count
          fetch-depth: 0

      - name: Extract version and build info
        id: extract
        run: |
          # workflow_dispatch has no tag — synthesize a dry-run version from the
          # short commit so downstream steps that template ${VERSION} still work.
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            SHORT=$(git rev-parse --short HEAD)
            TAG="dryrun-$SHORT"
            VERSION="0.0.0-dryrun.$SHORT"
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Build number = total commit count (matches Xcode CFBundleVersion convention)
          echo "build=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_long=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

          # Beta flag: tag contains "-beta" (dry-run treated as beta — never stable)
          if [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == dryrun-* ]]; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # build-macos: Build, sign, notarize, and package the Ghostties app
  # ---------------------------------------------------------------------------
  build-macos:
    needs: [setup]
    # macos-26 (Tahoe) is required for the macOS 26 SDK — Backport.swift
    # references NSGlassEffectView and SurfaceView.swift references
    # ConcentricRectangle, both gated by @available(macOS 26, *) but still
    # needing the type to exist at compile time.
    runs-on: macos-26
    timeout-minutes: 60
    env:
      GHOSTTIES_VERSION: ${{ needs.setup.outputs.version }}
      GHOSTTIES_BUILD: ${{ needs.setup.outputs.build }}
      GHOSTTIES_COMMIT: ${{ needs.setup.outputs.commit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Xcode version
        run: xcodebuild -version

      # Pin Xcode 26.3 for the Zig build. The macos-26 image's default Xcode
      # moved to 26.5, whose SDK changed libSystem.tbd to reference arm64e-macos
      # instead of aarch64-macos. Zig 0.15.2's linker can't match the two and
      # fails GhosttyKit.xcframework with undefined libSystem symbols
      # (_abort, _free, __availability_version_check, ...). 26.3 is the last
      # SDK Zig 0.15.2 links cleanly against, and still ships all macOS 26 SDK
      # types the Swift app build needs. Matches upstream ghostty-org/ghostty.
      # Re-evaluate when Zig 0.16 ships (ziglang/zig#31658).
      - name: Select Xcode 26.3 (Zig 0.15.2 SDK compatibility)
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version

      # Install Zig 0.15.2 (matches build.zig.zon minimum_zig_version).
      # Required to build GhosttyKit.xcframework from source.
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            zig-out
            .zig-cache
          key: zig-${{ runner.os }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-

      - name: Build GhosttyKit.xcframework
        run: zig build -Demit-macos-app=false -Doptimize=ReleaseFast

      # CEF (Chromium Embedded Framework) for the embedded browser feature.
      - name: Cache CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: |
            vendor/cef
            vendor/cef-build
          key: cef-${{ runner.os }}-${{ hashFiles('scripts/download-cef.sh', 'scripts/build-cef-wrapper.sh') }}-v1

      - name: Download CEF
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: bash scripts/download-cef.sh

      - name: Build CEF wrapper
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: bash scripts/build-cef-wrapper.sh

      # Build the Ghostties Xcode scheme in Release config.
      # -scheme Ghostties builds DockTilePlugin as a dependency automatically.
      # ONLY_ACTIVE_ARCH=YES ARCHS=arm64 is required because GhosttyKit.xcframework
      # is arm64-only (see build gotcha: reference-xcframework-arm64-only.md).
      # CODE_SIGNING_ALLOWED=NO skips signing during build; the dedicated
      # "Codesign app bundle" step below handles all signing with the CI keychain.
      - name: Build Ghostties.app
        run: |
          cd macos
          # SYMROOT pins the build output to macos/build/ so downstream steps
          # (Update Info.plist, codesign, DMG, notarize) find the .app at the
          # expected macos/build/Release/Ghostties.app path. Without this,
          # xcodebuild writes to ~/Library/Developer/Xcode/DerivedData/.
          xcodebuild \
            -scheme Ghostties \
            -configuration Release \
            SYMROOT="$(pwd)/build" \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS=

      # Inject version metadata and Sparkle public key into Info.plist.
      # SUPublicEDKey is NOT secret — it's the public half of the EdDSA keypair.
      - name: Update Info.plist
        run: |
          PLIST="macos/build/Release/Ghostties.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :GhosttyCommit $GHOSTTIES_COMMIT" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GHOSTTIES_BUILD" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $GHOSTTIES_VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :SUPublicEDKey p4A5Tc5lUgQGbOEnOGesE7YA+EPePQxKiLrKdRfvdMg=" "$PLIST"
          # Keep SUEnableAutomaticChecks=true so Sparkle skips the permission-request
          # prompt path entirely and goes straight to background checking. Deleting
          # this key (old behavior) caused Sparkle to wedge in _showingPermissionRequest
          # forever, silently swallowing every "Check for Updates" click.
          /usr/libexec/PlistBuddy -c "Set :SUEnableAutomaticChecks true" "$PLIST"

      - name: Codesign app bundle
        env:
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
        run: |
          # Decode the base64-encoded certificate to a .p12 file
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12

          # Create a temporary CI keychain so codesign runs headlessly (no UI prompt)
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain

          APP="macos/build/Release/Ghostties.app"
          FRAMEWORKS="$APP/Contents/Frameworks"
          CEF_FRAMEWORK="$FRAMEWORKS/Chromium Embedded Framework.framework"

          # --- CEF inside-out signing ---
          # Apple's notarization requires all nested binaries to be signed before
          # the outer bundle. CEF helper apps each need per-variant entitlements:
          # Renderer + GPU need allow-jit (V8/WebGL JIT), Plugin needs
          # disable-library-validation, Base + Alerts need minimal hardened runtime.

          # 1. Sign nested dylibs/binaries inside the CEF framework first.
          if [ -d "$CEF_FRAMEWORK" ]; then
            find "$CEF_FRAMEWORK" -type f \( -name "*.dylib" -o -name "*.so" \) -print0 \
              | while IFS= read -r -d '' f; do
                /usr/bin/codesign --force --timestamp --options runtime \
                  --sign "$MACOS_CERTIFICATE_NAME" "$f"
              done

            # 2. Sign the CEF framework bundle itself.
            /usr/bin/codesign --force --timestamp --options runtime \
              --sign "$MACOS_CERTIFICATE_NAME" "$CEF_FRAMEWORK"

            # 3. Sign each helper app with per-variant entitlements.
            for HELPER in "$FRAMEWORKS"/Ghostties\ Helper*.app; do
              case "$HELPER" in
                *"Renderer"*|*"GPU"*)
                  ENT="macos/Helper-Renderer.entitlements" ;;
                *"Plugin"*)
                  ENT="macos/Helper-Plugin.entitlements" ;;
                *)
                  ENT="macos/Helper.entitlements" ;;
              esac
              /usr/bin/codesign --force --timestamp --options runtime \
                --entitlements "$ENT" \
                --sign "$MACOS_CERTIFICATE_NAME" "$HELPER"
            done
          fi
          # --- end CEF inside-out signing ---

          # Sign Sparkle XPC services (required even though we don't sandbox Ghostties;
          # the binaries in Versions/ must be real files, not symlinks)
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime \
            "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime \
            "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime \
            "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime \
            "$APP/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime \
            "$APP/Contents/Frameworks/Sparkle.framework"
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime \
            "$APP/Contents/PlugIns/DockTilePlugin.plugin"

          # Sign the app bundle itself with entitlements
          /usr/bin/codesign --verbose -f -s "$MACOS_CERTIFICATE_NAME" -o runtime \
            --entitlements "macos/Ghostties.entitlements" "$APP"

      - name: Create DMG
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
        run: |
          npm install --global create-dmg
          create-dmg \
            --identity="$MACOS_CERTIFICATE_NAME" \
            ./macos/build/Release/Ghostties.app \
            ./
          mv ./Ghostties*.dmg ./Ghostties.dmg

      - name: Notarize DMG
        env:
          APPLE_NOTARIZATION_ISSUER: ${{ secrets.APPLE_NOTARIZATION_ISSUER }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
        run: |
          # Write the .p8 key to a temp file for notarytool
          echo "$APPLE_NOTARIZATION_KEY" > notarization_key.p8
          xcrun notarytool store-credentials "notarytool-profile" \
            --key notarization_key.p8 \
            --key-id "$APPLE_NOTARIZATION_KEY_ID" \
            --issuer "$APPLE_NOTARIZATION_ISSUER"
          rm notarization_key.p8

          # Submit and wait for Apple's notarization service.
          # Capture submission ID so we can fetch the detailed log if it fails.
          # --wait exits non-zero on Invalid, so we tee output and parse the ID.
          set -o pipefail
          xcrun notarytool submit "Ghostties.dmg" \
            --keychain-profile "notarytool-profile" \
            --wait | tee notarytool-submit.log
          NOTARIZE_EXIT=${PIPESTATUS[0]}

          # Always fetch the detailed log — Apple's per-file rejection reasons
          # only appear via `notarytool log`, never in the submit output.
          SUBMISSION_ID=$(grep -m1 "id:" notarytool-submit.log | head -1 | awk '{print $2}')
          if [ -n "$SUBMISSION_ID" ]; then
            echo "::group::Notarization detailed log (submission $SUBMISSION_ID)"
            xcrun notarytool log "$SUBMISSION_ID" \
              --keychain-profile "notarytool-profile" || true
            echo "::endgroup::"
          fi

          if [ "$NOTARIZE_EXIT" != "0" ]; then
            echo "::error::Notarization failed (exit $NOTARIZE_EXIT). See log above."
            exit "$NOTARIZE_EXIT"
          fi

          # Staple the ticket so Gatekeeper validates the app offline
          xcrun stapler staple "Ghostties.dmg"
          xcrun stapler staple "macos/build/Release/Ghostties.app"

      - name: Zip app
        run: |
          cd macos/build/Release
          zip -9 -r --symlinks ../../../ghostties-macos-arm64.zip Ghostties.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            Ghostties.dmg
            ghostties-macos-arm64.zip

  # ---------------------------------------------------------------------------
  # appcast: Sign the DMG and generate Sparkle appcast XML files
  #
  # For stable releases (tag has no "-beta"): update both appcast-stable.xml
  #   and appcast-beta.xml so stable users and beta users both receive the update.
  # For beta releases (tag contains "-beta"): update only appcast-beta.xml so
  #   stable channel users are not offered pre-release builds.
  # ---------------------------------------------------------------------------
  appcast:
    needs: [setup, build-macos]
    permissions:
      contents: write
    # Skip appcast generation on dry-run — we're not publishing.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
    runs-on: macos-26
    env:
      GHOSTTIES_VERSION: ${{ needs.setup.outputs.version }}
      GHOSTTIES_BUILD: ${{ needs.setup.outputs.build }}
      GHOSTTIES_COMMIT: ${{ needs.setup.outputs.commit }}
      GHOSTTIES_COMMIT_LONG: ${{ needs.setup.outputs.commit_long }}
      IS_BETA: ${{ needs.setup.outputs.is_beta }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos

      - name: Setup Sparkle CLI
        env:
          SPARKLE_VERSION: 2.9.0
        run: |
          mkdir -p .action/sparkle
          cd .action/sparkle
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-for-Swift-Package-Manager.zip" > sparkle.zip
          unzip sparkle.zip
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Sign DMG and generate appcasts
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Write private key, sign the DMG, then immediately remove the key file
          echo "$SPARKLE_PRIVATE_KEY" > signing.key
          sign_update -f signing.key Ghostties.dmg > sign_update.txt
          rm signing.key

          # Parse EdDSA signature and file length from sign_update output
          SIGNATURE=$(python3 -c "
          import re, sys
          txt = open('sign_update.txt').read()
          m = re.search(r'sparkle:edSignature=\"([^\"]+)\"', txt)
          print(m.group(1) if m else sys.exit(1))
          ")
          LENGTH=$(python3 -c "
          import re, sys
          txt = open('sign_update.txt').read()
          m = re.search(r'length=\"([^\"]+)\"', txt)
          print(m.group(1) if m else sys.exit(1))
          ")

          DMG_URL="https://github.com/SeanSmithDesign/ghostties/releases/download/v${GHOSTTIES_VERSION}/Ghostties.dmg"
          NOW=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          REPO="https://github.com/SeanSmithDesign/ghostties"

          python3 - \
            "$GHOSTTIES_VERSION" \
            "$GHOSTTIES_BUILD" \
            "$GHOSTTIES_COMMIT" \
            "$GHOSTTIES_COMMIT_LONG" \
            "$SIGNATURE" \
            "$LENGTH" \
            "$DMG_URL" \
            "$NOW" \
            "$REPO" \
            "$IS_BETA" <<'PYEOF'
          import sys

          version, build, commit, commit_long, signature, length, dmg_url, now, repo, is_beta_str = sys.argv[1:]
          is_beta = is_beta_str.lower() == "true"

          item_xml = f"""  <item>
              <title>Ghostties v{version}</title>
              <pubDate>{now}</pubDate>
              <sparkle:version>{build}</sparkle:version>
              <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>13.0.0</sparkle:minimumSystemVersion>
              <description><![CDATA[
                <h1>Ghostties v{version}</h1>
                <p>Built from commit <a href="{repo}/commits/{commit_long}">{commit}</a>.</p>
                <p>See <a href="{repo}/releases/tag/v{version}">release notes</a> on GitHub.</p>
              ]]></description>
              <enclosure
                url="{dmg_url}"
                type="application/octet-stream"
                sparkle:edSignature="{signature}"
                length="{length}" />
            </item>"""

          def make_appcast(title, desc, item):
              return f"""<?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>{title}</title>
              <description>{desc}</description>
          {item}
            </channel>
          </rss>"""

          # Beta appcast always includes this release
          with open("appcast-beta.xml", "w") as f:
              f.write(make_appcast(
                  "Ghostties Beta Releases",
                  "Beta and stable releases of Ghostties",
                  item_xml
              ))

          if is_beta:
              # Beta release: stable channel gets a no-op placeholder so the
              # artifact always exists on the GitHub Release for download by URL.
              print("Beta tag detected — stable channel unchanged.")
              stable_xml = """<?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Ghostties Stable Releases</title>
              <description>No stable release available yet.</description>
            </channel>
          </rss>"""
          else:
              print("Stable tag detected — updating both channels.")
              stable_xml = make_appcast(
                  "Ghostties Stable Releases",
                  "Stable releases of Ghostties",
                  item_xml
              )

          with open("appcast-stable.xml", "w") as f:
              f.write(stable_xml)
          PYEOF

      - name: Upload appcast artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appcasts
          path: |
            appcast-stable.xml
            appcast-beta.xml

      - name: Commit appcast to web/
        run: |
          # Save generated appcasts + DMG before switching to main branch
          cp appcast-beta.xml /tmp/appcast-beta.xml
          cp appcast-stable.xml /tmp/appcast-stable.xml
          DMG_SIZE_BYTES=$(stat -f%z Ghostties.dmg 2>/dev/null || stat -c%s Ghostties.dmg)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main:main
          git switch main

          cp /tmp/appcast-beta.xml web/appcast-beta.xml
          if [[ "$IS_BETA" != "true" ]]; then
            cp /tmp/appcast-stable.xml web/appcast-stable.xml
          fi

          # Update version strings in web HTML files. DMG size is passed
          # so the meta line on /download stays in sync with the binary.
          python3 scripts/update-web-version.py "${{ github.ref_name }}" "$DMG_SIZE_BYTES"

          git add web/appcast-beta.xml web/appcast-stable.xml scripts/update-web-version.py web/index.html web/download.html
          if git diff --cached --quiet; then
            echo "No appcast changes to commit."
          else
            git commit -m "chore(appcast): update from ${GITHUB_REF_NAME} [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # release: Create the GitHub Release with all artifacts attached
  # ---------------------------------------------------------------------------
  release:
    needs: [setup, build-macos, appcast]
    # Skip GitHub Release creation on dry-run — DMG stays as a CI artifact only.
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.setup.outputs.tag }}
      IS_BETA: ${{ needs.setup.outputs.is_beta }}
      GHOSTTIES_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos

      - name: Download appcast artifacts
        uses: actions/download-artifact@v4
        with:
          name: appcasts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$IS_BETA" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            $PRERELEASE_FLAG \
            --repo SeanSmithDesign/ghostties \
            --title "Ghostties v${GHOSTTIES_VERSION}" \
            --notes "Ghostties v${GHOSTTIES_VERSION}" \
            Ghostties.dmg \
            ghostties-macos-arm64.zip \
            appcast-stable.xml \
            appcast-beta.xml
